spring.application.name=takterrassen_backend
server.port=${PORT:9090}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/testdb}

# Disable Spring Boot MongoDB auto-configuration (manual connection management)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoReactiveDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.mongo.MongoReactiveAutoConfiguration

# JWT Secret (should be set as environment variable in production)
jwt.secret=${JWT_SECRET:your-default-secret-key-change-this-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Password validation
password.min-length=8
password.max-length=128
password.require-uppercase=true
password.require-lowercase=true
password.require-digit=true
password.require-special=true
