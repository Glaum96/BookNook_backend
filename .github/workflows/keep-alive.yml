name: Keep Render Service Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Ping health endpoint
        run: |
          REQUEST_ID=$(uuidgen || cat /proc/sys/kernel/random/uuid)
          curl -fsS --max-time 30 --retry 2 --retry-delay 5 \
            -H "X-Request-ID: $REQUEST_ID" \
            "https://booknook-backend.onrender.com/" \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            || echo "Ping failed (service may be waking up)"
